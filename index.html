<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greater Edmonton Golf Sim and Pickleball Locations</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin="anonymous" />

  <!-- MarkerCluster CSS -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
        crossorigin="anonymous" />
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
        crossorigin="anonymous" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ── Header ───────────────────────────── -->
  <header class="header">
    <div class="header-logos" id="header-logos">
      <!-- Logos injected by JS (or placeholder shown) -->
    </div>
    <div class="header-title" id="header-title"></div>
  </header>

  <div class="main-content">

    <!-- ── Sidebar ─────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-inner">

        <!-- Search -->
        <div class="sidebar-section">
          <div class="search-wrapper">
            <span class="search-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <circle cx="6.5" cy="6.5" r="5.5" stroke="#8a8fa8" stroke-width="1.5"/>
                <line x1="10.5" y1="10.5" x2="14.5" y2="14.5" stroke="#8a8fa8" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <input type="text" id="search-input" placeholder="Search locations…" autocomplete="off" />
            <button id="search-clear" title="Clear search" aria-label="Clear search">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Category filters -->
        <div class="sidebar-section">
          <div class="filters-label">Filter by type</div>
          <div id="category-filters"></div>
        </div>

        <!-- Count -->
        <div class="count-row">
          <span id="location-count"></span>
        </div>

        <!-- Location list -->
        <div id="location-list"></div>

      </div>
    </aside>

    <!-- ── Map ─────────────────────────────── -->
    <div id="map"></div>

  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin="anonymous"></script>

<!-- MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
        crossorigin="anonymous"></script>

<!-- App scripts (order matters) -->
<script src="config.js"></script>
<script src="data.js"></script>
<script src="map.js"></script>
<script src="filters.js"></script>

<script>
  // ── Bootstrap ─────────────────────────────
  document.getElementById("header-title").textContent = CONFIG.title;

  // Render logos (show placeholder if Base64 is still the template string)
  (function renderLogos() {
    const container = document.getElementById("header-logos");

    function isPlaceholder(src) {
      return !src || src.includes("PASTE_") || src.length < 50;
    }

    ["companyLogo", "clientLogo"].forEach(function (key, i) {
      const src = LOGOS[key];
      if (isPlaceholder(src)) {
        const ph = document.createElement("div");
        ph.className   = "logo-placeholder";
        ph.textContent = key === "companyLogo" ? "Company Logo" : "Client Logo";
        container.appendChild(ph);
      } else {
        const img = document.createElement("img");
        img.src       = src;
        img.alt       = key === "companyLogo" ? "Company" : "Client";
        img.className = "header-logo";
        container.appendChild(img);
      }

      // Divider between the two logos
      if (i === 0) {
        const div = document.createElement("div");
        div.className = "header-divider";
        container.appendChild(div);
      }
    });
  })();

  // Init map → then filters (filters need allMarkers from map.js)
  initMap();
  buildFilters();
  initSearch();
  applyFilters();
  // Force Leaflet to recalculate the container size after layout settles
  setTimeout(function () { map.invalidateSize(); }, 100);
</script>

</body>
</html>
